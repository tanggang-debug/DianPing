  # --- RocketMQ 服务 ---
  namesrv:
    image: apache/rocketmq:4.9.6
    container_name: rmqnamesrv
    network_mode: host
    environment:
      - JAVA_OPT=-Djava.net.preferIPv4Stack=true
    volumes:
      - ./data/namesrv/logs:/home/rocketmq/logs
    command: sh mqnamesrv

  broker:
    image: apache/rocketmq:4.9.6
    container_name: rmqbroker
    network_mode: host
    environment:
      - NAMESRV_ADDR=127.0.0.1:9876
      # 重点：这里定义我们要用的内存参数
      - JAVA_OPT=-server -Xms1g -Xmx1g -Xmn512m -Djava.net.preferIPv4Stack=true
      # 尝试强制指定最大堆内存
      - MAX_POSSIBLE_HEAP=1073741824
    depends_on:
      - namesrv
    # 重点：修改 command，先 export 环境变量再启动，或者直接在启动前打印
    command: sh -c "export JAVA_OPT=\"$${JAVA_OPT}\" && sh mqbroker -c /opt/rocketmq/conf/broker.conf"
    volumes:
      - ./broker.conf:/opt/rocketmq/conf/broker.conf
      - ./data/broker/logs:/home/rocketmq/logs
      - ./data/broker/store:/home/rocketmq/store
    user: root
  dashboard:
    image: apacherocketmq/rocketmq-dashboard:1.0.0
    container_name: rmqdashboard
    network_mode: host
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=127.0.0.1:9876 -Djava.net.preferIPv4Stack=true
    depends_on:
      - namesrv
