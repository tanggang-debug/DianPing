  # --- Nacos 服务 (Host 模式 + MySQL 持久化) ---
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    network_mode: host
    environment:
      - MODE=standalone
      # 1. 删掉了所有带有 db.xxx 的 MySQL 配置，直接不指定 SPRING_DATASOURCE_PLATFORM，默认就是内建 Derby

      - JVM_XMS=512m
      - JVM_XMX=512m

      # 2. 开启鉴权核心配置（在原生数据库下依然需要强密钥保证高版本正常登录）
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789abCdeFgHiJkLmNoPqRsTuVwXyZ=
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security