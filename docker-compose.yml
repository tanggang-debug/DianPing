version: '3.8'

services:
  # --- Redis 服务 ---
  redis:
    image: redis:7.2-alpine
    container_name: redis
    # 删掉 network_mode: host，改用 ports
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis/data:/data
      - ./redis.conf:/etc/redis/redis.conf
    #    command: redis-server /etc/redis/redis.conf --appendonly yes --appendfsync everysec
    command: redis-server --appendonly yes --appendfsync everysec --requirepass 123456
    privileged: true
    restart: always

